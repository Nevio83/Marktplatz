<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warenkorb - Marktplatz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
    <link href="cart.css" rel="stylesheet">
    <script src="https://js.stripe.com/v3/"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-shop"></i> Marktplatz
            </a>
            <a href="index.html" class="btn btn-outline-primary">
                <i class="bi bi-arrow-left"></i> Zurück zum Shop
            </a>
        </div>
    </nav>

    <div class="main-container" style="background:#eaf8f7; border-radius:24px; padding:2rem 0;">
        <div class="page-header">
            <h1 class="page-title">
                <i class="bi bi-cart3"></i> Ihr Warenkorb
            </h1>
            <p class="page-subtitle">Überprüfen Sie Ihre Artikel und schließen Sie Ihre Bestellung ab</p>
        </div>

        <div id="cartContent">
            <!-- Wird dynamisch gefüllt -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    // Währungseinstellungen nach Land
    const currencyByCountry = {
        'DE': { symbol: '€', code: 'EUR', name: 'Deutschland' },
        'US': { symbol: '$', code: 'USD', name: 'Vereinigte Staaten' },
        'GB': { symbol: '£', code: 'GBP', name: 'Vereinigtes Königreich' },
        'CH': { symbol: 'CHF', code: 'CHF', name: 'Schweiz' },
        'AT': { symbol: '€', code: 'EUR', name: 'Österreich' },
        'FR': { symbol: '€', code: 'EUR', name: 'Frankreich' },
        'IT': { symbol: '€', code: 'EUR', name: 'Italien' },
        'ES': { symbol: '€', code: 'EUR', name: 'Spanien' },
        'NL': { symbol: '€', code: 'EUR', name: 'Niederlande' },
        'BE': { symbol: '€', code: 'EUR', name: 'Belgien' },
        'CA': { symbol: 'CAD$', code: 'CAD', name: 'Kanada' },
        'AU': { symbol: 'AUD$', code: 'AUD', name: 'Australien' },
        'JP': { symbol: '¥', code: 'JPY', name: 'Japan' },
        'BR': { symbol: 'R$', code: 'BRL', name: 'Brasilien' },
        'MX': { symbol: 'MX$', code: 'MXN', name: 'Mexiko' }
    };
    
    let currentCountry = 'DE';
    let currentCurrency = currencyByCountry[currentCountry];
    
    // Versandkosten nach Land
    function getShippingCost(countryCode) {
        return countryCode === 'DE' ? 0 : 4.99;
    }
    
    // Nominatim OpenStreetMap API für Adressvorschläge
    let addressTimeout;
    
    function searchAddresses(query) {
        if (query.length < 3) {
            document.getElementById('address-suggestions').style.display = 'none';
            return;
        }
        
        clearTimeout(addressTimeout);
        addressTimeout = setTimeout(async () => {
            try {
                const selectedCountry = document.getElementById('country').value;
                let searchQuery = query;
                
                // Wenn ein Land ausgewählt ist, nur in diesem Land suchen
                if (selectedCountry && selectedCountry !== '') {
                    const countryName = currencyByCountry[selectedCountry]?.name || selectedCountry;
                    searchQuery += `, ${countryName}`;
                }
                
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=5&q=${encodeURIComponent(searchQuery)}`);
                const data = await response.json();
                showAddressSuggestions(data);
            } catch (error) {
                console.error('Fehler beim Laden der Adressvorschläge:', error);
            }
        }, 300);
    }
    
    function showAddressSuggestions(addresses) {
        const suggestionsDiv = document.getElementById('address-suggestions');
        if (!suggestionsDiv) return;
        
        if (addresses.length === 0) {
            suggestionsDiv.style.display = 'none';
            return;
        }
        
        suggestionsDiv.innerHTML = addresses.map(addr => `
            <div class="address-suggestion" onclick="selectAddress('${addr.display_name.replace(/'/g, "\\'")}')"> 
                ${addr.display_name}
            </div>
        `).join('');
        suggestionsDiv.style.display = 'block';
    }
    
    function selectAddress(address) {
        document.getElementById('address').value = address;
        document.getElementById('address-suggestions').style.display = 'none';
        
        // Land aus Adresse extrahieren und automatisch im Dropdown setzen
        const countryMatch = address.match(/,\s*([A-Za-z\s]+)$/);
        if (countryMatch) {
            const country = countryMatch[1].trim();
            const countryCode = getCountryCodeFromName(country);
            if (countryCode && currencyByCountry[countryCode]) {
                // Land im Dropdown setzen
                const countrySelect = document.getElementById('country');
                if (countrySelect) {
                    countrySelect.value = countryCode;
                }
                
                // Währung und Versandkosten aktualisieren
                currentCountry = countryCode;
                currentCurrency = currencyByCountry[countryCode];
                updateCartPage();
            }
        }
        
        // Hinweis für Hausnummer anzeigen
        showHouseNumberHint();
    }
    
    function showHouseNumberHint() {
        const addressField = document.getElementById('address');
        const hintDiv = document.getElementById('house-number-hint');
        
        if (hintDiv) {
            hintDiv.style.display = 'block';
            setTimeout(() => {
                hintDiv.style.display = 'none';
            }, 5000);
        }
    }
    
    function getCountryCodeFromName(countryName) {
        const countryMap = {
            'Deutschland': 'DE',
            'Germany': 'DE',
            'United States': 'US',
            'USA': 'US',
            'United Kingdom': 'GB',
            'UK': 'GB',
            'Schweiz': 'CH',
            'Switzerland': 'CH',
            'Österreich': 'AT',
            'Austria': 'AT',
            'Frankreich': 'FR',
            'France': 'FR',
            'Italien': 'IT',
            'Italy': 'IT',
            'Spanien': 'ES',
            'Spain': 'ES',
            'Niederlande': 'NL',
            'Netherlands': 'NL',
            'Belgien': 'BE',
            'Belgium': 'BE',
            'Canada': 'CA',
            'Kanada': 'CA',
            'Australia': 'AU',
            'Australien': 'AU',
            'Japan': 'JP',
            'Brasil': 'BR',
            'Brazil': 'BR',
            'Brasilien': 'BR',
            'Mexico': 'MX',
            'Mexiko': 'MX'
        };
        return countryMap[countryName];
    }
    
    function onCountryChange() {
        const selectedCountry = document.getElementById('country').value;
        if (selectedCountry && currencyByCountry[selectedCountry]) {
            currentCountry = selectedCountry;
            currentCurrency = currencyByCountry[selectedCountry];
            updateCartPage();
            
            // Adressfeld leeren wenn Land geändert wird
            document.getElementById('address').value = '';
        }
    }
    
    // Timer-Logik für Bestellübersicht
    let timerInterval;
    function startCartTimer() {
        let timeLeft = 600; // 10 Minuten in Sekunden
        const timerDiv = document.getElementById('cart-timer');
        if (!timerDiv) return;
        timerDiv.textContent = `Ihr Warenkorb leert sich in 10:00 Minuten`;
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            const min = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const sec = (timeLeft % 60).toString().padStart(2, '0');
            timerDiv.textContent = `Ihr Warenkorb leert sich in ${min}:${sec} Minuten`;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                localStorage.removeItem('cart');
                updateCartPage();
                timerDiv.textContent = 'Ihr Warenkorb wurde geleert.';
            }
        }, 1000);
    }

    function updateCartPage() {
        const cartItems = JSON.parse(localStorage.getItem('cart')) || [];
        const cartContent = document.getElementById('cartContent');
        
        if (cartItems.length === 0) {
            cartContent.innerHTML = `
                <div class="empty-cart">
                    <div class="empty-cart-icon">
                        <i class="bi bi-cart-x"></i>
                    </div>
                    <h3>Ihr Warenkorb ist leer</h3>
                    <p>Entdecken Sie unsere Produkte und fügen Sie Artikel zu Ihrem Warenkorb hinzu.</p>
                    <a href="index.html" class="continue-shopping">
                        <i class="bi bi-arrow-left"></i> Weiter einkaufen
                    </a>
                </div>
            `;
            return;
        }
        
        const subtotal = cartItems.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        const shipping = getShippingCost(currentCountry);
        const total = subtotal + shipping;
        
        cartContent.innerHTML = `
            <div class="cart-layout">
                <div class="cart-items-section">
                    <h3 class="mb-4">
                        <i class="bi bi-bag-check"></i> Ihre Artikel (${cartItems.length})
                    </h3>
                    <div id="cartItemsList">
                        ${cartItems.map(item => `
                            <div class="cart-item" data-id="${item.id}">
                                <img src="${item.image}" alt="${item.name}" class="cart-item-image">
                                <div class="cart-item-details">
                                    <h5>${item.name}</h5>
                                    <div class="cart-item-price">${currentCurrency.symbol}${item.price.toFixed(2)}</div>
                                </div>
                                <div class="quantity-controls">
                                    <button class="quantity-btn" onclick="changeQuantity(${item.id}, -1)">
                                        <i class="bi bi-dash"></i>
                                    </button>
                                    <span class="quantity-display">${item.quantity}</span>
                                    <button class="quantity-btn" onclick="changeQuantity(${item.id}, 1)">
                                        <i class="bi bi-plus"></i>
                                    </button>
                                </div>
                                <button class="remove-btn" onclick="removeFromCart(${item.id})">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <div class="checkout-section">
                    <div class="checkout-header">
                        <h3 class="checkout-title">
                            <i class="bi bi-credit-card"></i> Bestellung
                        </h3>
                    </div>
                    
                    <div class="order-summary">
                        <div id="cart-timer" class="mb-2 text-danger fw-bold"></div>
                        <div class="summary-row">
                            <span>Zwischensumme:</span>
                            <span>${currentCurrency.symbol}${subtotal.toFixed(2)}</span>
                        </div>
                        <div class="summary-row">
                            <span>Versand:</span>
                            <span>${shipping === 0 ? 'Kostenlos' : currentCurrency.symbol + shipping.toFixed(2)}</span>
                        </div>
                        <div class="summary-row total">
                            <span>Gesamt:</span>
                            <span>${currentCurrency.symbol}${total.toFixed(2)}</span>
                        </div>
                    </div>
                    
                    <!-- Express-Checkout Bereich -->
                    <div class="text-center mb-3">
                        <div class="fw-semibold mb-3" style="font-size:1.1rem;">Express-Checkout</div>
                        <div class="d-flex justify-content-center gap-2 flex-wrap mb-2">
                            <button class="btn px-3 py-2 d-flex align-items-center justify-content-center" style="background:#0070ba; color:#fff; border-radius:12px; font-weight:600; font-size:0.9rem; border:none; min-width:120px;" onclick="alert('PayPal Checkout (Demo)')">
                                <svg width="20" height="20" viewBox="0 0 24 24" style="margin-right:6px;">
                                    <path fill="#fff" d="M7.076 21.337H2.47a.641.641 0 0 1-.633-.74L4.944.901C5.026.382 5.474 0 5.998 0h7.46c2.57 0 4.578.543 5.69 1.81 1.01 1.15 1.304 2.42 1.012 4.287-.023.143-.047.288-.077.437-.983 5.05-4.349 6.797-8.647 6.797h-2.19c-.524 0-.968.382-1.05.9l-1.12 7.106zm14.146-14.42a.641.641 0 0 1-.633-.74L23.696.901C23.778.382 24.226 0 24.75 0h7.46c2.57 0 4.578.543 5.69 1.81 1.01 1.15 1.304 2.42 1.012 4.287-.023.143-.047.288-.077.437-.983 5.05-4.349 6.797-8.647 6.797h-2.19c-.524 0-.968.382-1.05.9l-1.12 7.106h-4.606a.641.641 0 0 1-.633-.74l3.107-19.696z"/>
                                </svg>
                                PayPal
                            </button>
                            <button class="btn px-3 py-2 d-flex align-items-center justify-content-center" style="background:#000; color:#fff; border-radius:12px; font-weight:600; font-size:0.9rem; border:none; min-width:120px;" onclick="alert('Google Pay Checkout (Demo)')">
                                <img src="karten/google pay.png" alt="Google Pay" style="height:20px; margin-right:6px;"> G Pay
                            </button>
                        </div>
                        <div class="d-flex justify-content-center gap-2 flex-wrap mb-2">
                            <button class="btn px-3 py-2 d-flex align-items-center justify-content-center" style="background:#fff; color:#222; border-radius:12px; font-weight:600; font-size:0.9rem; border:1.5px solid #222; min-width:120px;" onclick="alert('Apple Pay Checkout (Demo)')">
                                <i class="bi bi-apple" style="font-size:18px; margin-right:6px;"></i> Apple Pay
                            </button>
                            <button class="btn px-3 py-2 d-flex align-items-center justify-content-center" style="background:#ffdaec; color:#222; border-radius:12px; font-weight:600; font-size:0.9rem; border:none; min-width:120px;" onclick="alert('Klarna Checkout (Demo)')">
                                <img src="karten/klarna.png" alt="Klarna" style="height:20px; margin-right:6px;"> Klarna
                            </button>
                        </div>
                        <div class="d-flex align-items-center justify-content-center my-3" style="gap:1rem;">
                            <hr style="flex:1; border-top:1.5px solid #cfd8dc; margin:0;">
                            <span class="text-muted fw-semibold" style="font-size:0.9rem;">ODER</span>
                            <hr style="flex:1; border-top:1.5px solid #cfd8dc; margin:0;">
                        </div>
                    </div>
                    
                    <form id="stripe-form" class="payment-form">
                        <div class="form-group">
                            <label for="email" class="form-label">
                                <i class="bi bi-envelope"></i> E-Mail-Adresse
                            </label>
                            <input type="email" id="email" class="form-control" required autocomplete="email" placeholder="ihre@email.de">
                        </div>
                        
                        <div class="row">
                            <div class="col-6">
                                <div class="form-group">
                                    <label for="firstname" class="form-label">
                                        <i class="bi bi-person"></i> Vorname
                                    </label>
                                    <input type="text" id="firstname" class="form-control" required placeholder="Vorname">
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="form-group">
                                    <label for="lastname" class="form-label">
                                        <i class="bi bi-person-fill"></i> Nachname
                                    </label>
                                    <input type="text" id="lastname" class="form-control" required placeholder="Nachname">
                                </div>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="country" class="form-label">
                                <i class="bi bi-globe"></i> Land
                            </label>
                            <select id="country" class="form-control" onchange="onCountryChange()" required>
                                <option value="">Land auswählen</option>
                                <option value="DE" ${currentCountry === 'DE' ? 'selected' : ''}>Deutschland</option>
                                <option value="AT" ${currentCountry === 'AT' ? 'selected' : ''}>Österreich</option>
                                <option value="CH" ${currentCountry === 'CH' ? 'selected' : ''}>Schweiz</option>
                                <option value="FR" ${currentCountry === 'FR' ? 'selected' : ''}>Frankreich</option>
                                <option value="IT" ${currentCountry === 'IT' ? 'selected' : ''}>Italien</option>
                                <option value="ES" ${currentCountry === 'ES' ? 'selected' : ''}>Spanien</option>
                                <option value="NL" ${currentCountry === 'NL' ? 'selected' : ''}>Niederlande</option>
                                <option value="BE" ${currentCountry === 'BE' ? 'selected' : ''}>Belgien</option>
                                <option value="US" ${currentCountry === 'US' ? 'selected' : ''}>Vereinigte Staaten</option>
                                <option value="GB" ${currentCountry === 'GB' ? 'selected' : ''}>Vereinigtes Königreich</option>
                                <option value="CA" ${currentCountry === 'CA' ? 'selected' : ''}>Kanada</option>
                                <option value="AU" ${currentCountry === 'AU' ? 'selected' : ''}>Australien</option>
                                <option value="JP" ${currentCountry === 'JP' ? 'selected' : ''}>Japan</option>
                                <option value="BR" ${currentCountry === 'BR' ? 'selected' : ''}>Brasilien</option>
                                <option value="MX" ${currentCountry === 'MX' ? 'selected' : ''}>Mexiko</option>
                            </select>
                        </div>
                        
                        <div class="form-group position-relative">
                            <label for="address" class="form-label">
                                <i class="bi bi-geo-alt"></i> Adresse
                            </label>
                            <input type="text" id="address" class="form-control" required placeholder="Straße und Hausnummer" oninput="searchAddresses(this.value)">
                            <div id="address-suggestions" style="display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #ddd;border-top:none;border-radius:0 0 8px 8px;max-height:200px;overflow-y:auto;z-index:1000;"></div>
                            <div id="house-number-hint" style="display:none;position:absolute;top:100%;left:0;right:0;background:#fff3cd;border:1px solid #ffeaa7;border-radius:0 0 8px 8px;padding:8px;font-size:0.85rem;color:#856404;z-index:999;">
                                <i class="bi bi-info-circle"></i> Bitte fügen Sie die Hausnummer hinzu, falls noch nicht vorhanden.
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">
                                <i class="bi bi-credit-card-2-front"></i> Kartendaten
                            </label>
                            <div class="payment-methods mb-2">
                                <img src="karten/visa.png" alt="Visa" style="height:30px; margin-right:8px;">
                                <img src="karten/bancontact.png" alt="Bancontact" style="height:30px; margin-right:8px;">
                                <img src="karten/blik.png" alt="Blik" style="height:30px; margin-right:8px;">
                                <img src="karten/EPS.png" alt="EPS" style="height:30px; margin-right:8px;">
                                <span class="position-relative" style="cursor:pointer;" onmouseover="showMoreCards()" onmouseout="hideMoreCards()">
                                    <span class="badge bg-secondary">+1</span>
                                    <div id="more-cards-tooltip" style="display:none;position:absolute;left:30px;top:-10px;z-index:10;background:#222;color:#fff;padding:8px 12px;border-radius:8px;white-space:nowrap;">
                                        <img src='karten/giropay.png' alt='Giropay' style='height:24px;margin-right:6px;'>
                                        <img src='karten/cartes bancaires.jpg' alt='Cartes Bancaires' style='height:24px;margin-right:6px;'>
                                    </div>
                                </span>
                            </div>
                            <input type="text" id="card-number" class="form-control mb-2" placeholder="4242 4242 4242 4242" maxlength="19" oninput="formatCardNumber(this)">
                            <div class="row">
                                <div class="col-6">
                                    <input type="text" id="card-expiry" class="form-control" placeholder="MM/YY" maxlength="5" oninput="formatExpiry(this)">
                                </div>
                                <div class="col-3">
                                    <input type="text" id="card-cvc" class="form-control" placeholder="CVC" maxlength="4">
                                </div>
                                <div class="col-3">
                                    <input type="text" id="card-zip" class="form-control" placeholder="PLZ" maxlength="5">
                                </div>
                            </div>
                        </div>
                        
                        <button type="submit" class="checkout-btn">
                            <i class="bi bi-lock"></i> Sicher bezahlen - ${currentCurrency.symbol}${total.toFixed(2)}
                        </button>
                        
                        <div id="stripe-error"></div>
                        <div id="stripe-success">
                            <i class="bi bi-check-circle"></i>
                            <div>Zahlung erfolgreich!</div>
                        </div>
                        
                        <div class="security-info">
                            <i class="bi bi-shield-check"></i>
                            <span>SSL-verschlüsselte sichere Verbindung</span>
                        </div>
                    </form>
                </div>
            </div>
        `;
        
        startCartTimer();
    }
    
    function showMoreCards() {
        document.getElementById('more-cards-tooltip').style.display = 'block';
    }
    
    function hideMoreCards() {
        document.getElementById('more-cards-tooltip').style.display = 'none';
    }
    
    function formatCardNumber(input) {
        let value = input.value.replace(/\s/g, '').replace(/[^0-9]/gi, '');
        let formattedValue = value.match(/.{1,4}/g)?.join(' ') || value;
        input.value = formattedValue;
    }
    
    function formatExpiry(input) {
        let value = input.value.replace(/\D/g, '');
        if (value.length >= 2) {
            value = value.substring(0, 2) + '/' + value.substring(2, 4);
        }
        input.value = value;
    }
    
    function changeQuantity(productId, change) {
        let cartItems = JSON.parse(localStorage.getItem('cart')) || [];
        const itemIndex = cartItems.findIndex(item => item.id === productId);
        
        if (itemIndex !== -1) {
            cartItems[itemIndex].quantity += change;
            
            if (cartItems[itemIndex].quantity <= 0) {
                cartItems.splice(itemIndex, 1);
            }
            
            localStorage.setItem('cart', JSON.stringify(cartItems));
            updateCartPage();
        }
    }
    
    function removeFromCart(productId) {
        let cartItems = JSON.parse(localStorage.getItem('cart')) || [];
        cartItems = cartItems.filter(item => item.id !== productId);
        localStorage.setItem('cart', JSON.stringify(cartItems));
        updateCartPage();
    }
    
    // Event Listener für das Schließen der Adressvorschläge beim Klicken außerhalb
    document.addEventListener('click', function(e) {
        if (!e.target.closest('#address') && !e.target.closest('#address-suggestions')) {
            const suggestions = document.getElementById('address-suggestions');
            if (suggestions) {
                suggestions.style.display = 'none';
            }
        }
        
        if (!e.target.closest('#address')) {
            const hint = document.getElementById('house-number-hint');
            if (hint) {
                hint.style.display = 'none';
            }
        }
    });
    
    document.addEventListener('DOMContentLoaded', updateCartPage);
    </script>
    
    <style>
    .address-suggestion {
        padding: 10px;
        cursor: pointer;
        border-bottom: 1px solid #eee;
        transition: background-color 0.2s;
    }
    
    .address-suggestion:hover {
        background-color: #f8f9fa;
    }
    
    .address-suggestion:last-child {
        border-bottom: none;
    }
    
    .payment-methods {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 4px;
    }
    
    .payment-methods img {
        border-radius: 4px;
        border: 1px solid #e0e0e0;
    }
    </style>
</body>
</html>
