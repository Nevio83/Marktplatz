<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warenkorb - Marktplatz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
    <link href="cart.css" rel="stylesheet">
    <script src="https://js.stripe.com/v3/"></script>


    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-shop"></i> Marktplatz
            </a>
            <a href="index.html" class="btn btn-outline-primary">
                <i class="bi bi-arrow-left"></i> Zurück zum Shop
            </a>
        </div>
    </nav>

    <div class="main-container" style="background:#eaf8f7; border-radius:24px; padding:2rem 0;">
        <div class="page-header">
            <h1 class="page-title">
                <i class="bi bi-cart3"></i> Ihr Warenkorb
            </h1>
            <p class="page-subtitle">Überprüfen Sie Ihre Artikel und schließen Sie Ihre Bestellung ab</p>
        </div>

        <!-- Express-Checkout Bereich -->
        <div class="text-center mb-2">
            <div class="fw-semibold mb-3" style="font-size:1.1rem;">Express-Checkout</div>
            <div class="d-flex justify-content-center gap-3 flex-wrap mb-2">
                <button class="btn px-4 py-2 d-flex align-items-center justify-content-center" style="background:#5a31f4; color:#fff; border-radius:14px; font-weight:600; font-size:1.1rem; border:none; min-width:160px;" onclick="alert('Shop Pay Checkout (Demo)')">
                    <img src="https://cdn.shopify.com/shopifycloud/shop-pay/assets/shop-pay-logo.svg" alt="Shop Pay" style="height:28px; margin-right:10px;"> Shop Pay
                </button>
                <button class="btn px-4 py-2 d-flex align-items-center justify-content-center" style="background:#ffc439; color:#222; border-radius:14px; font-weight:600; font-size:1.1rem; border:none; min-width:160px;" onclick="alert('PayPal Checkout (Demo)')">
                    <img src="karten/bancontact.png" alt="PayPal" style="height:28px; margin-right:10px;"> PayPal
                </button>
                <button class="btn px-4 py-2 d-flex align-items-center justify-content-center" style="background:#000; color:#fff; border-radius:14px; font-weight:600; font-size:1.1rem; border:none; min-width:160px;" onclick="alert('Google Pay Checkout (Demo)')">
                    <img src="karten/google pay.png" alt="Google Pay" style="height:28px; margin-right:10px;"> G Pay
                </button>
                <button class="btn px-4 py-2 d-flex align-items-center justify-content-center" style="background:#fff; color:#222; border-radius:14px; font-weight:600; font-size:1.1rem; border:1.5px solid #222; min-width:160px;" onclick="alert('Apple Pay Checkout (Demo)')">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" alt="Apple Pay" style="height:24px; margin-right:10px;"> Apple Pay
                </button>
                <button class="btn px-4 py-2 d-flex align-items-center justify-content-center" style="background:#ffdaec; color:#222; border-radius:14px; font-weight:600; font-size:1.1rem; border:none; min-width:160px;" onclick="alert('Klarna Checkout (Demo)')">
                    <img src="karten/klarna.png" alt="Klarna" style="height:28px; margin-right:10px;"> Klarna
                </button>
            </div>
            <div class="d-flex align-items-center justify-content-center my-3" style="gap:1rem;">
                <hr style="flex:1; border-top:1.5px solid #cfd8dc; margin:0;">
                <span class="text-muted fw-semibold" style="font-size:1.1rem;">ODER</span>
                <hr style="flex:1; border-top:1.5px solid #cfd8dc; margin:0;">
            </div>
        </div>
        <div id="cartContent">
            <!-- Wird dynamisch gefüllt -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    // Timer-Logik für Bestellübersicht
    let timerInterval;
    function startCartTimer() {
        let timeLeft = 600; // 10 Minuten in Sekunden
        const timerDiv = document.getElementById('cart-timer');
        if (!timerDiv) return;
        timerDiv.textContent = `Ihr Warenkorb leert sich in 10:00 Minuten`;
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            const min = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const sec = (timeLeft % 60).toString().padStart(2, '0');
            timerDiv.textContent = `Ihr Warenkorb leert sich in ${min}:${sec} Minuten`;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                localStorage.removeItem('cart');
                updateCartPage();
                timerDiv.textContent = 'Ihr Warenkorb wurde geleert.';
            }
        }, 1000);
    }

    function updateCartPage() {
        const cartItems = JSON.parse(localStorage.getItem('cart')) || [];
        const cartContent = document.getElementById('cartContent');
        
        if (cartItems.length === 0) {
            cartContent.innerHTML = `
                <div class="empty-cart">
                    <div class="empty-cart-icon">
                        <i class="bi bi-cart-x"></i>
                    </div>
                    <h3>Ihr Warenkorb ist leer</h3>
                    <p>Entdecken Sie unsere Produkte und fügen Sie Artikel zu Ihrem Warenkorb hinzu.</p>
                    <a href="index.html" class="continue-shopping">
                        <i class="bi bi-arrow-left"></i> Weiter einkaufen
                    </a>
                </div>
            `;
            return;
        }
        
        const subtotal = cartItems.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        const shipping = 4.99;
        const total = subtotal + shipping;
        
        cartContent.innerHTML = `
            <div class="cart-layout">
                <div class="cart-items-section">
                    <h3 class="mb-4">
                        <i class="bi bi-bag-check"></i> Ihre Artikel (${cartItems.length})
                    </h3>
                    <div id="cartItemsList">
                        ${cartItems.map(item => `
                            <div class="cart-item" data-id="${item.id}">
                                <img src="${item.image}" alt="${item.name}" class="cart-item-image">
                                <div class="cart-item-details">
                                    <h5>${item.name}</h5>
                                    <div class="cart-item-price">€${item.price.toFixed(2)}</div>
                                </div>
                                <div class="quantity-controls">
                                    <button class="quantity-btn" onclick="changeQuantity(${item.id}, -1)">
                                        <i class="bi bi-dash"></i>
                                    </button>
                                    <span class="quantity-display">${item.quantity}</span>
                                    <button class="quantity-btn" onclick="changeQuantity(${item.id}, 1)">
                                        <i class="bi bi-plus"></i>
                                    </button>
                                </div>
                                <button class="remove-btn" onclick="removeFromCart(${item.id})">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <div class="checkout-section">
                    <div class="checkout-header">
                        <h3 class="checkout-title">
                            <i class="bi bi-credit-card"></i> Bestellung
                        </h3>
                    </div>
                    
                    <div class="order-summary">
                        <div id="cart-timer" class="mb-2 text-danger fw-bold"></div>
                        <div class="summary-row">
                            <span>Zwischensumme:</span>
                            <span>€${subtotal.toFixed(2)}</span>
                        </div>
                        <div class="summary-row">
                            <span>Versand:</span>
                            <span>€${shipping.toFixed(2)}</span>
                        </div>
                        <div class="summary-row total">
                            <span>Gesamt:</span>
                            <span>€${total.toFixed(2)}</span>
                        </div>
                    </div>
                    
                    <form id="stripe-form" class="payment-form">
                        <div class="form-group">
                            <label for="email" class="form-label">
                                <i class="bi bi-envelope"></i> E-Mail-Adresse
                            </label>
                            <input type="email" id="email" class="form-control" required autocomplete="email" placeholder="ihre@email.de">
                        </div>
                        
                        <div class="payment-methods stripe-logos mb-2">
                            <img src="karten/visa.png" alt="Visa">
                            <img src="karten/bancontact.png" alt="Mastercard">
                            <img src="karten/blik.png" alt="Amex">
                            <img src="karten/EPS.png" alt="Discover">
                            <span class="position-relative" style="cursor:pointer;" onmouseover="document.getElementById('more-cards-tooltip').style.display='block'" onmouseout="document.getElementById('more-cards-tooltip').style.display='none'">
                                <span class="badge bg-secondary">+3</span>
                                <span id="more-cards-tooltip" style="display:none;position:absolute;left:30px;top:-10px;z-index:10;background:#222;color:#fff;padding:6px 12px;border-radius:8px;white-space:nowrap;">
                                    <img src='karten/giropay.png' alt='giropay' style='height:22px;margin-right:4px;'>
                                    <img src='karten/cartes bancaires.jpg' alt='cartes' style='height:22px;'>
                                </span>
                            </span>
                        </div>
                        
                        <div class="form-group">
                            <label for="card-element" class="form-label">
                                <i class="bi bi-credit-card-2-front"></i> Kartendaten
                            </label>
                            <div id="card-element" class="form-control" style="height:auto;padding:0;"></div>
                        </div>
                        
                        <button type="submit" class="checkout-btn">
                            <i class="bi bi-lock"></i> Sicher bezahlen - €${total.toFixed(2)}
                        </button>
                        
                        <div id="stripe-error"></div>
                        <div id="stripe-success">
                            <i class="bi bi-check-circle"></i>
                            <div>Zahlung erfolgreich!</div>
                        </div>
                        
                        <div class="security-info">
                            <i class="bi bi-shield-check"></i>
                            <span>SSL-verschlüsselte sichere Verbindung</span>
                        </div>
                    </form>
                </div>
            </div>
        `;
        
        startCartTimer();
        initializeStripe();
    }
    
    function changeQuantity(productId, change) {
        let cartItems = JSON.parse(localStorage.getItem('cart')) || [];
        const itemIndex = cartItems.findIndex(item => item.id === productId);
        
        if (itemIndex !== -1) {
            cartItems[itemIndex].quantity += change;
            
            if (cartItems[itemIndex].quantity <= 0) {
                cartItems.splice(itemIndex, 1);
            }
            
            localStorage.setItem('cart', JSON.stringify(cartItems));
            updateCartPage();
        }
    }
    
    function removeFromCart(productId) {
        let cartItems = JSON.parse(localStorage.getItem('cart')) || [];
        cartItems = cartItems.filter(item => item.id !== productId);
        localStorage.setItem('cart', JSON.stringify(cartItems));
        updateCartPage();
    }
    
    function initializeStripe() {
        const stripe = Stripe('pk_test_51RgJy8B31V654n3WvISwKtd2TuquEkWzDLpwPcFvJO8QGOFsRLIJX9RxGGZ0nrVQhNIVHPqYYuTRjgvu1wiJw7Zx00QrJ2Nrvr');
        const elements = stripe.elements();
        const card = elements.create('card', {
            style: {
                base: {
                    fontSize: '16px',
                    color: '#2c3e50',
                    '::placeholder': {
                        color: '#7f8c8d'
                    }
                }
            }
        });
        card.mount('#card-element');
        
        const form = document.getElementById('stripe-form');
        const errorDiv = document.getElementById('stripe-error');
        const successDiv = document.getElementById('stripe-success');
        
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            errorDiv.textContent = '';
            successDiv.style.display = 'none';
            
            const submitButton = form.querySelector('button[type="submit"]');
            submitButton.disabled = true;
            submitButton.innerHTML = '<i class="bi bi-hourglass-split"></i> Verarbeitung...';
            
            const cartItems = JSON.parse(localStorage.getItem('cart') || '[]');
            const email = document.getElementById('email').value;
            
            if (cartItems.length === 0) {
                errorDiv.textContent = 'Ihr Warenkorb ist leer.';
                submitButton.disabled = false;
                submitButton.innerHTML = '<i class="bi bi-lock"></i> Sicher bezahlen';
                return;
            }
            
            try {
                const response = await fetch('/api/create-payment-intent', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cart: cartItems, email })
                });
                const data = await response.json();
                
                if (!data.clientSecret) {
                    errorDiv.textContent = data.error || 'Fehler bei der Zahlung.';
                    submitButton.disabled = false;
                    submitButton.innerHTML = '<i class="bi bi-lock"></i> Sicher bezahlen';
                    return;
                }
                
                const { paymentIntent, error } = await stripe.confirmCardPayment(data.clientSecret, {
                    payment_method: {
                        card: card,
                        billing_details: { email }
                    }
                });
                
                if (error) {
                    errorDiv.textContent = error.message;
                    submitButton.disabled = false;
                    submitButton.innerHTML = '<i class="bi bi-lock"></i> Sicher bezahlen';
                } else if (paymentIntent && paymentIntent.status === 'succeeded') {
                    successDiv.style.display = 'block';
                    submitButton.style.display = 'none';
                    
                    // Warenkorb leeren
                    localStorage.removeItem('cart');
                    
                    setTimeout(() => {
                        window.location.href = 'success.html';
                    }, 2000);
                }
            } catch (error) {
                errorDiv.textContent = 'Ein unerwarteter Fehler ist aufgetreten.';
                submitButton.disabled = false;
                submitButton.innerHTML = '<i class="bi bi-lock"></i> Sicher bezahlen';
            }
        });
    }
    
    document.addEventListener('DOMContentLoaded', updateCartPage);
    </script>
</body>
</html>
