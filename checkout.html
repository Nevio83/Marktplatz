<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Marktplatz</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Stripe Integration -->
  <script src="https://js.stripe.com/v3/"></script>
</head>
<body>
  <header>
    <h1>Bezahlvorgang</h1>
    <nav>
      <a href="index.html">Produkte</a>
      <a href="cart.html">Warenkorb</a>
    </nav>
  </header>

  <main class="checkout-container">
    <section class="payment-methods">
      <div class="payment-card" id="paypal-button"></div>
      <div class="payment-card">
        <form id="stripe-form">
          <div id="card-element"></div>
          <button type="submit">Mit Karte bezahlen</button>
        </form>
      </div>
    </section>

    <aside class="order-summary">
      <h2>Bestellübersicht</h2>
      <ul id="order-items"></ul>
      <p class="total-price">Gesamt: <span id="total-amount">0€</span></p>
    </aside>
  </main>

  <script src="checkout.js"></script>
  <!-- PayPal Integration -->
  <script src="https://www.paypal.com/sdk/js?client-id=YOUR_CLIENT_ID&currency=EUR"></script>
</body>
</html>
