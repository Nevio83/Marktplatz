<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marktplatz - Startseite</title>
    <meta name="description" content="Online-Marktplatz mit besten Angeboten">
    <meta name="keywords" content="ecommerce, online shopping, elektronik, mode">
    
    <!-- Stylesheets -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="styles.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                <img src="logo.png" alt="Marktplatz Logo" width="40" class="me-2">
                Marktplatz
            </a>
            
            <div class="d-flex gap-3 align-items-center">
                <!-- Search Form -->
                <form class="d-flex" style="min-width: 300px;">
                    <div class="input-group">
                        <input type="search" id="searchInput"
                               class="form-control rounded-pill" 
                               placeholder="Suche...">
                        <button class="btn btn-primary rounded-pill px-4">
                            <i class="bi bi-search"></i>
                        </button>
                    </div>
                </form>

                <!-- Action Buttons -->
                <div class="d-flex gap-2">
                    <a href="login.html" 
                       class="btn btn-outline-secondary px-3"
                       title="Anmelden">
                        <i class="bi bi-box-arrow-in-right"></i>
                    </a>
                    <a href="cart.html" 
                       class="btn btn-primary position-relative px-3"
                       title="Warenkorb">
                        <i class="bi bi-cart3"></i>
                        <span id="cartCounter" 
                              class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                            0
                        </span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        <!-- Promotional Carousel -->
        <div id="promoCarousel" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="banner1.jpg" 
                         class="d-block w-100" 
                         alt="Sommerschlussverkauf"
                         style="max-height: 400px; object-fit: cover;">
                </div>
                <div class="carousel-item">
                    <img src="banner2.jpg" 
                         class="d-block w-100" 
                         alt="Neue Kollektion"
                         style="max-height: 400px; object-fit: cover;">
                </div>
            </div>
        </div>

        <!-- Product Grid -->
        <div class="container mt-5">
            <div class="row mb-4">
                <div class="col-md-4">
                 
                    </select>
                </div>
                <div class="col-md-4">
                    <select class="form-select rounded-pill" id="priceSort">
                        <option>Aufsteigend</option>
                        <option>Absteigend</option>
                    </select>
                </div>
            </div>

            <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4" id="productGrid">
                <!-- Product Cards will be inserted here -->
                <div class="col">
                    <div class="card h-100 border-0 shadow-hover">
                        <div class="ratio ratio-4x3">
                            <img src="placeholder-product.jpg" 
                                 class="card-img-top object-fit-cover" 
                                 alt="Produkt">
                        </div>
                        <div class="card-body">
                            <h5 class="card-title">Premium Kopfhörer</h5>
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <span class="h4 text-primary">€89.99</span>
                                    <small class="text-muted d-block">inkl. MwSt.</small>
                                </div>
                                <button class="btn btn-primary rounded-pill px-3 py-2" data-product-id="1">
                                    <i class="bi bi-cart-plus me-2"></i>Hinzufügen
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white mt-5 pt-5 border-top">
        <div class="container">
            <div class="row g-4">
                <div class="col-md-4">
                    <h5 class="mb-3">Über uns</h5>
                    <p class="text-muted">Ihr vertrauenswürdiger Online-Marktplatz seit 2024.</p>
                    <div class="social-icons">
                        <a href="#" class="text-white me-3"><i class="bi bi-facebook"></i></a>
                        <a href="#" class="text-white me-3"><i class="bi bi-instagram"></i></a>
                        <a href="#" class="text-white"><i class="bi bi-twitter-x"></i></a>
                    </div>
                </div>
                <div class="col-md-2">
                    <h5 class="mb-3">Einkaufen</h5>
                    <ul class="list-unstyled">
                        <li><a href="#" class="text-white text-decoration-none">Angebote</a></li>
                        <li><a href="#" class="text-white text-decoration-none">Neue Produkte</a></li>
                        <li><a href="#" class="text-white text-decoration-none">Kategorien</a></li>
                    </ul>
                </div>
                <div class="col-md-2">
                    <h5 class="mb-3">Support</h5>
                    <ul class="list-unstyled">
                        <li><a href="kontakt.html" class="text-white text-decoration-none">Kontakt</a></li>
                        <li><a href="versand.html" class="text-white text-decoration-none">Versand</a></li>
                        <li><a href="retouren.html" class="text-white text-decoration-none">Retouren</a></li>
                    </ul>
                </div>
            </div>
            <div class="text-center py-4 text-muted">
                © 2024 Marktplatz - Alle Rechte vorbehalten
            </div>
        </div>
    </footer>
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
