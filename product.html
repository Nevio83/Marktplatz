<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produktdetails</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/elevatezoom/3.0.8/elevatezoom-min.css" rel="stylesheet">
</head>
<body>
    <!-- Navigation same as index.html -->

    <div class="container mt-5">
        <div class="row">
            <div class="col-md-6">
                <img id="productImage" src="placeholder.jpg" class="img-fluid" 
                     data-zoom-image="large-placeholder.jpg">
            </div>
            <div class="col-md-6">
                <h1 id="productTitle">Produktname</h1>
                <div class="price mb-3 fs-4">€<span id="productPrice">0.00</span></div>
                
                <div class="variants mb-3">
                    <select class="form-select">
                        <option>Größe wählen</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label>Menge:</label>
                    <input type="number" min="1" value="1" class="form-control w-25">
                </div>

                <button class="btn btn-primary btn-lg">In den Warenkorb</button>

                <div class="mt-4">
                    <h4>Produktbeschreibung</h4>
                    <p id="productDescription"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/elevatezoom/3.0.8/jquery.elevatezoom.min.js"></script>
    <script src="product.js"></script>
</body>
</html>
